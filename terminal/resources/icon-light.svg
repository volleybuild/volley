<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="#f0f2f5"/>

  <!-- Subtle radial glow -->
  <radialGradient id="bg-glow-lt" cx="512" cy="460" r="400" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#f8fafb"/>
    <stop offset="1" stop-color="#eef1f4"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="228" fill="url(#bg-glow-lt)"/>

  <!-- Three dots — deeper colors for light bg -->
  <circle cx="320" cy="390" r="105" fill="#10b981"/>
  <circle cx="704" cy="390" r="105" fill="#d97706"/>
  <circle cx="512" cy="634" r="105" fill="#7c3aed"/>
</svg>
