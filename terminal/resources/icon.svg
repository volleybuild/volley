<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="#0a0c0f"/>

  <!-- Subtle radial glow behind the dots -->
  <radialGradient id="bg-glow" cx="512" cy="460" r="400" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#0f1a1a"/>
    <stop offset="1" stop-color="#0a0c0f"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="228" fill="url(#bg-glow)"/>

  <defs>
    <!-- Per-dot glow filters -->
    <filter id="glow-mint" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.83 0 0 0 0 0.6 0 0 0 0.4 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.98 0 0 0 0 0.75 0 0 0 0 0.14 0 0 0 0.4 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-violet" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.65 0 0 0 0 0.55 0 0 0 0 0.97 0 0 0 0.4 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Three dots in V arrangement, scaled from 76x64 viewBox -->
  <!-- Top-left: mint, Top-right: amber, Bottom-center: violet -->
  <g filter="url(#glow-mint)">
    <circle cx="320" cy="390" r="105" fill="#34d399"/>
  </g>
  <g filter="url(#glow-amber)">
    <circle cx="704" cy="390" r="105" fill="#fbbf24"/>
  </g>
  <g filter="url(#glow-violet)">
    <circle cx="512" cy="634" r="105" fill="#a78bfa"/>
  </g>
</svg>
